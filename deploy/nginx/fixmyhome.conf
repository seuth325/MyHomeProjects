# Nginx reverse proxy for fixmyhome.pro -> Next.js app (Docker, port 3000)
# Install: sudo cp deploy/nginx/fixmyhome.conf /etc/nginx/sites-available/fixmyhome
#          sudo ln -s /etc/nginx/sites-available/fixmyhome /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see README "Deploy to a VPS" section) to add the HTTPS block.

server {
    listen 80;
    listen [::]:80;
    server_name fixmyhome.pro www.fixmyhome.pro;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
