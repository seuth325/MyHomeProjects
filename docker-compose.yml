services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fixmyhome
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: fixmyhome
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixmyhome -d fixmyhome"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"

  # One-off migration runner: docker compose run --rm migrate
  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    profiles: ["tools"]

volumes:
  db_data:
